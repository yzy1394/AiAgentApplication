edition: 1.0.0
name: ai-agent-fc-app
access: default

services:
  framework:
    component: fc

    actions:
      pre-deploy:
        - run: |
            set -e
            if [ -d /opt/java17 ]; then
              export JAVA_HOME=/opt/java17
            elif [ -d /usr/lib/jvm/java-17-openjdk ]; then
              export JAVA_HOME=/usr/lib/jvm/java-17-openjdk
            elif [ -d /usr/lib/jvm/java-17-openjdk-amd64 ]; then
              export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            else
              echo "[FATAL] JDK17 not found in build environment"
              java -version || true
              exit 1
            fi
            export PATH=$JAVA_HOME/bin:$PATH
            echo "[INFO] Build JDK:"
            java -version
            mvn -v
            mvn -DskipTests clean package
            echo "[INFO] Build artifacts:"
            ls -lah target
            test -n "$(ls target/*.jar 2>/dev/null | grep -v '\.original$' | head -n 1)"

    props:
      region: cn-hangzhou

      service:
        name: ai-agent-svc
        description: ai-agent service

      function:
        name: ai-agent-web
        description: ai-agent spring boot app
        runtime: custom
        codeUri: ./
        timeout: 120
        caPort: 9000
        memorySize: 2048
        cpu: 1
        diskSize: 1024

        environmentVariables:
          JAVA_HOME: /opt/java17
          PATH: "/opt/java17/bin:/usr/local/bin/apache-maven/bin:/usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/local/ruby/bin:/opt/bin:/code:/code/bin"
          LD_LIBRARY_PATH: "/code:/code/lib:/usr/local/lib:/opt/lib:/opt/php8.1/lib:/opt/php8.0/lib:/opt/php7.2/lib"

          SPRING_PROFILES_ACTIVE: "prod"
          SERVER_PORT: "9000"
          SERVER_CONTEXT_PATH: "/api"

          ALI_DASHSCOPE_API_KEY: sk-6988b3414e1341e58d427abc28b61152
          SEARCH_API_KEY: Ar8gXzdj9RmhkWB5saTcuSUY
          MYSQL_URL: rm-bp1o15jnv4k6j7151.rwlb.rds.aliyuncs.com
          MYSQL_USERNAME: root
          MYSQL_PASSWORD: '!Yuan20030924'

        layers:
          - acs:fc:cn-hangzhou:official:layers/Java17/versions/2

        customRuntimeConfig:
          command:
            - sh
          args:
            - -c
            - |
              set -e
              export JAVA_HOME=/opt/java17
              export PATH=$JAVA_HOME/bin:$PATH
              echo "[INFO] Runtime JDK:"
              java -version
              
              JAR_FILE=$(ls /code/target/*.jar 2>/dev/null | grep -v '\.original$' | head -n 1)
              if [ -z "$JAR_FILE" ]; then
                echo "[FATAL] jar not found in /code/target"
                ls -lah /code/target || true
                exit 1
              fi
              
              echo "[INFO] starting jar: $JAR_FILE"
              exec java ${JAVA_OPTS:-} -jar "$JAR_FILE" --server.port=${SERVER_PORT:-9000}

      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - HEAD
              - PATCH
              - OPTIONS
