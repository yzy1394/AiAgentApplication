edition: 1.0.0
name: ai-agent-fc-app
access: default

services:
  framework:
    component: fc
    props:
      region: cn-hangzhou

      service:
        name: ai-agent-svc
        description: ai-agent service

      function:
        name: ai-agent-web
        description: ai-agent spring boot app
        runtime: custom
        codeUri: ./
        timeout: 120
        caPort: 9000
        memorySize: 2048
        cpu: 1
        diskSize: 512

        environmentVariables:
          JAVA_HOME: /opt/java17
          PATH: /opt/java17/bin:/usr/local/bin/apache-maven/bin:/usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/local/ruby/bin:/opt/bin:/code:/code/bin
          LD_LIBRARY_PATH: /code:/code/lib:/usr/local/lib:/opt/lib:/opt/php8.1/lib:/opt/php8.0/lib:/opt/php7.2/lib

          SPRING_PROFILES_ACTIVE: prod
          SERVER_PORT: "9000"
          SERVER_CONTEXT_PATH: /api

          ALI_DASHSCOPE_API_KEY: sk-6988b3414e1341e58d427abc28b61152
          SEARCH_API_KEY: Ar8gXzdj9RmhkWB5saTcuSUY
          MYSQL_URL: rm-bp1o15jnv4k6j7151.rwlb.rds.aliyuncs.com
          MYSQL_USERNAME: root
          MYSQL_PASSWORD: !Yuan20030924

        layers:
          - acs:fc:cn-hangzhou:official:layers/Java17/versions/2

        customRuntimeConfig:
          command:
            - java
          args:
            - -jar
            - target/ai-agent-0.0.1-SNAPSHOT.jar

      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - HEAD
              - PATCH
              - OPTIONS
